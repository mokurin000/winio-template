name: build-android

on:
  workflow_call:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    name: Android APKs

    steps:
      - uses: actions/checkout@v6

      - name: ☕️ Setup Java (Temurin 17)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: 🦀 Setup Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: |
            aarch64-linux-android
            armv7-linux-androideabi
            x86_64-linux-android
          components: rust-src

      - name: 📦 Install cargo-ndk
        run: |
          curl -LO \
            https://github.com/bbqsrc/cargo-ndk/releases/download/v4.1.2/cargo-ndk-x86_64-unknown-linux-gnu-v4.1.2.tgz
          tar xvf cargo-ndk-x86_64-unknown-linux-gnu-v4.1.2.tgz
          mv cargo-ndk-x86_64-unknown-linux-gnu-v4.1.2/cargo-ndk ~/.cargo/bin/
          rm -rf cargo-ndk-x86_64-unknown-linux-gnu-v4.1.2*

      - name: 📦️ Setup gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "9.6.0"

      - name: ♻️ Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: app-android

      - name: 🏗 Build APKs
        env:
          # See https://github.com/actions/runner-images/blob/main/images/ubuntu/Ubuntu2404-Readme.md
          ANDROID_NDK_HOME: /usr/local/lib/android/sdk/ndk/29.0.14206865
          ANDROID_NDK_ROOT: /usr/local/lib/android/sdk/ndk/29.0.14206865
        run: |
          mkdir -p .android

          base64 -d > .android/key.properties <<EOF
          ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          EOF

          cd android
          gradle assembleRelease

      - name: 📁 Collect split APKs
        shell: bash
        run: |
          mkdir -p dist
          for apk in android/app/build/outputs/apk/release/app-*-release.apk; do
            name=$(basename "$apk")
            abi=$(echo "$name" | sed 's/^app-//;s/-release\.apk$//')
            cp "$apk" "dist/app-android-${abi}.apk"
          done
          ls -lh dist

      - name: 📤 Upload APKs
        uses: actions/upload-artifact@v7
        with:
          name: app-android-apks
          path: dist/*
